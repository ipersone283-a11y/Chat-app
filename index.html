<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Real Chat - 1vs1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --my-msg: #0ea5e9;
            --peer-msg: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 450px; height: 95vh;
            background: var(--card); border-radius: 24px;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative; margin: 10px;
        }

        /* Setup Screen */
        #setup-screen {
            padding: 30px; display: flex; flex-direction: column;
            justify-content: center; height: 100%; text-align: center;
        }

        .avatar-picker {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin: 20px 0;
        }

        .avatar-option {
            font-size: 30px; cursor: pointer; padding: 10px;
            border-radius: 12px; border: 2px solid transparent;
            background: rgba(255,255,255,0.05);
        }

        .avatar-option.selected {
            border-color: var(--accent); background: rgba(56, 189, 248, 0.2);
        }

        input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #334155; background: #0f172a;
            color: white; outline: none; margin-bottom: 15px;
        }

        button {
            padding: 14px; border-radius: 12px; border: none;
            background: var(--accent); color: white; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Chat Screen */
        #chat-screen { display: none; flex-direction: column; height: 100%; }

        #chat-header {
            padding: 15px 20px; background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        #message-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg-bubble {
            max-width: 80%; display: flex; gap: 8px; align-items: flex-end;
        }

        .msg-content {
            padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4;
        }

        .my-msg { align-self: flex-end; flex-direction: row-reverse; }
        .my-msg .msg-content { background: var(--my-msg); border-bottom-right-radius: 4px; }

        .peer-msg { align-self: flex-start; }
        .peer-msg .msg-content { background: var(--peer-msg); border-bottom-left-radius: 4px; }

        .msg-avatar { font-size: 20px; }

        #input-container {
            padding: 15px; display: flex; gap: 10px;
            background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05);
        }

        .id-badge {
            font-size: 11px; background: #0f172a; color: var(--accent);
            padding: 5px 10px; border-radius: 20px; border: 1px solid var(--accent);
        }

        .copy-btn { font-size: 10px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup-screen">
        <h2 style="margin-bottom: 10px;">Luxe Chat</h2>
        <p style="color: #94a3b8; font-size: 14px;">আপনার প্রোফাইল এবং অবতার বেছে নিন</p>
        
        <div class="avatar-picker" id="avatarPicker">
            <span class="avatar-option selected" onclick="selectAvatar(this)">😎</span>
            <span class="avatar-option" onclick="selectAvatar(this)">👻</span>
            <span class="avatar-option" onclick="selectAvatar(this)">🐱</span>
            <span class="avatar-option" onclick="selectAvatar(this)">🤖</span>
            <span class="avatar-option" onclick="selectAvatar(this)">🦊</span>
            <span class="avatar-option" onclick="selectAvatar(this)">🦁</span>
            <span class="avatar-option" onclick="selectAvatar(this)">🥷</span>
            <span class="avatar-option" onclick="selectAvatar(this)">👽</span>
        </div>

        <input type="text" id="userNameInput" placeholder="আপনার নাম">
        <button onclick="initUser()">প্রবেশ করুন</button>
        
        <div id="connection-controls" style="display: none; margin-top: 20px;">
            <p style="font-size: 12px; margin-bottom: 5px;">আপনার আইডি:</p>
            <div id="myIdDisplay" style="color: var(--accent); font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;">...</div>
            <input type="text" id="peerIdInput" placeholder="বন্ধুর আইডি দিন">
            <button onclick="connectToPeer()" style="width: 100%; background: #22c55e;">চ্যাট শুরু করুন</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <div>
                <span id="remote-avatar">💬</span>
                <span id="remote-name" style="font-weight: bold; margin-left: 5px;">বন্ধুর নাম</span>
            </div>
            <div class="id-badge" onclick="copyMyId()">Copy My ID</div>
        </div>
        
        <div id="message-area"></div>

        <div id="input-container">
            <input type="text" id="chatInput" placeholder="কিছু লিখুন..." style="margin-bottom: 0;">
            <button onclick="sendChatMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    let peer, conn, myId, myName, myAvatar = "😎";

    // ১. অবতার সিলেক্ট করা
    function selectAvatar(el) {
        document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
        myAvatar = el.innerText;
    }

    // ২. ইউজার প্রোফাইল সেভ এবং পিয়ার তৈরি
    function initUser() {
        myName = document.getElementById('userNameInput').value.trim();
        if(!myName) return alert("নাম দিন");

        document.getElementById('userNameInput').disabled = true;
        document.querySelector('#setup-screen button').style.display = "none";
        document.getElementById('connection-controls').style.display = "block";

        peer = new Peer();
        peer.on('open', (id) => {
            myId = id;
            document.getElementById('myIdDisplay').innerText = id;
        });

        // ইনকামিং কানেকশন হ্যান্ডেল করা
        peer.on('connection', (incomingConn) => {
            conn = incomingConn;
            handleConnection();
        });
    }

    // ৩. বন্ধুর সাথে কানেক্ট করা
    function connectToPeer() {
        const friendId = document.getElementById('peerIdInput').value.trim();
        if(!friendId) return alert("বন্ধুর আইডি দিন");
        
        conn = peer.connect(friendId, {
            metadata: { name: myName, avatar: myAvatar }
        });
        handleConnection();
    }

    // ৪. কানেকশন লজিক
    function handleConnection() {
        conn.on('open', () => {
            // কানেক্ট হওয়ার পর নিজের তথ্য পাঠানো (যদি নিজে রিসিভার হই)
            if(conn.metadata) {
                updatePeerUI(conn.metadata.name, conn.metadata.avatar);
            }
            conn.send({ type: 'info', name: myName, avatar: myAvatar });

            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('chat-screen').style.display = "flex";
        });

        conn.on('data', (data) => {
            if(data.type === 'info') {
                updatePeerUI(data.name, data.avatar);
            } else if(data.type === 'msg') {
                renderMessage(data.avatar, data.text, 'peer-msg');
            }
        });
    }

    function updatePeerUI(name, avatar) {
        document.getElementById('remote-name').innerText = name;
        document.getElementById('remote-avatar').innerText = avatar;
    }

    // ৫. মেসেজ পাঠানো
    function sendChatMessage() {
        const text = document.getElementById('chatInput').value.trim();
        if(!text || !conn) return;

        conn.send({ type: 'msg', text: text, avatar: myAvatar });
        renderMessage(myAvatar, text, 'my-msg');
        document.getElementById('chatInput').value = "";
    }

    // ৬. চ্যাট স্ক্রিনে মেসেজ দেখানো
    function renderMessage(avatar, text, type) {
        const area = document.getElementById('message-area');
        const div = document.createElement('div');
        div.className = `msg-bubble ${type}`;
        div.innerHTML = `
            <span class="msg-avatar">${avatar}</span>
            <div class="msg-content">${text}</div>
        `;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function copyMyId() {
        navigator.clipboard.writeText(myId);
        alert("আপনার ID কপি হয়েছে!");
    }

    // Enter বাটনে মেসেজ সেন্ড
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendChatMessage();
    });
</script>

</body>
</html>
