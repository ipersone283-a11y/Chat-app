<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Universal ChatRoom</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0f0f1a; --panel: #1a1a2e; --header: #16213e; --border: #2a2a4a;
      --accent: #6366f1; --accent2: #8b5cf6; --text: #fff; --muted: #aaa;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    
    #login-screen { display: none; text-align: center; padding: 40px; background: var(--panel); border-radius: 20px; box-shadow: 0 0 50px rgba(99,102,241,0.3); }
    #google-btn { background: white; color: #333; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: 20px auto; }

    #app { display: none; width: 100vw; height: 100vh; max-width: 800px; flex-direction: column; background: var(--panel); }
    #header { padding: 15px; background: var(--header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    
    .msg { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
    .msg.mine { align-self: flex-end; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-bottom-right-radius: 2px; }
    .msg.other { align-self: flex-start; background: var(--border); border-bottom-left-radius: 2px; }
    .sender-name { font-size: 10px; color: #a5b4fc; margin-bottom: 3px; display: block; }

    #input-area { padding: 15px; display: flex; gap: 10px; background: var(--header); }
    #msg-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; }
    #send-btn { background: var(--accent); border: none; padding: 0 20px; border-radius: 10px; color: white; cursor: pointer; }

    /* In-App Notification Toast */
    #notification-toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: #1e1e3a; border: 1px solid var(--accent); padding: 10px 20px;
      border-radius: 30px; display: flex; align-items: center; gap: 10px;
      transition: top 0.5s ease; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }
    #notification-toast.show { top: 20px; }
  </style>
</head>
<body>

<div id="loading">Loading...</div>

<div id="login-screen">
    <h1>💬 Universal Chat</h1>
    <button id="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Sign in with Google
    </button>
</div>

<div id="app">
    <div id="header">
        <div><strong>ChatRoom</strong><br><small id="online-count">● Live</small></div>
        <img id="user-avatar" src="" width="35" style="border-radius: 50%; border: 2px solid var(--accent); cursor:pointer;">
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Type message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<div id="notification-toast">
    <img id="notif-img" src="" width="30" style="border-radius:50%">
    <div id="notif-text"></div>
</div>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7ZZPQZMhpF0387z7zttH_k7JLl1K2pG4",
        authDomain: "my-chat-app-d6889.firebaseapp.com",
        projectId: "my-chat-app-d6889",
        storageBucket: "my-chat-app-d6889.firebasestorage.app",
        messagingSenderId: "656889790538",
        appId: "1:656889790538:web:25f264816e46624999e6b3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loading = document.getElementById('loading');
    const appShell = document.getElementById('app');
    const loginScreen = document.getElementById('login-screen');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msg-input');
    const notifSound = document.getElementById('notif-sound');

    let currentUser = null;
    let isFirstLoad = true;

    // --- Auth Logic ---
    onAuthStateChanged(auth, user => {
        loading.style.display = 'none';
        if (user) {
            currentUser = user;
            document.getElementById('user-avatar').src = user.photoURL;
            loginScreen.style.display = 'none';
            appShell.style.display = 'flex';
            startListening();
        } else {
            loginScreen.style.display = 'block';
            appShell.style.display = 'none';
        }
    });

    document.getElementById('google-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    document.getElementById('user-avatar').onclick = () => { if(confirm("Logout?")) signOut(auth); };

    // --- Message Logic ---
    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;
        msgInput.value = '';
        await addDoc(collection(db, 'messages'), {
            text,
            uid: currentUser.uid,
            name: currentUser.displayName,
            photoURL: currentUser.photoURL,
            createdAt: serverTimestamp()
        });
    }

    document.getElementById('send-btn').onclick = sendMessage;
    msgInput.onkeydown = e => { if(e.key === 'Enter') sendMessage(); };

    function startListening() {
        const q = query(collection(db, 'messages'), orderBy('createdAt', 'asc'), limit(50));
        
        onSnapshot(q, snapshot => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    const data = change.doc.data();
                    renderMessage(data);

                    // Notification Logic: Nijer message bade onno keu pathale
                    if (!isFirstLoad && data.uid !== currentUser.uid) {
                        showNotification(data);
                    }
                }
            });
            isFirstLoad = false;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }

    function renderMessage(data) {
        const isMine = data.uid === currentUser.uid;
        const div = document.createElement('div');
        div.className = `msg ${isMine ? 'mine' : 'other'}`;
        div.innerHTML = `
            ${!isMine ? `<span class="sender-name">${data.name}</span>` : ''}
            ${data.text}
        `;
        messagesDiv.appendChild(div);
    }

    function showNotification(data) {
        const toast = document.getElementById('notification-toast');
        document.getElementById('notif-img').src = data.photoURL;
        document.getElementById('notif-text').innerHTML = `<strong>${data.name}</strong>: ${data.text.substring(0, 20)}...`;
        
        toast.classList.add('show');
        notifSound.play().catch(e => console.log("Sound blocked by browser"));

        setTimeout(() => toast.classList.remove('show'), 3000);
    }
</script>
</body>
</html>
