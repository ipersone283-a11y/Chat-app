<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LOGIN SCREEN */
    #login-screen {
      text-align: center;
      padding: 40px;
      background: #1a1a2e;
      border-radius: 20px;
      width: 340px;
      box-shadow: 0 0 40px rgba(99,102,241,0.3);
    }
    #login-screen h1 { font-size: 2rem; margin-bottom: 8px; }
    #login-screen p  { color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }

    #google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    #google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,255,255,0.15);
    }
    #google-btn img { width: 22px; }

    /* CHAT SCREEN */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 700px;
      height: 100vh;
      background: #1a1a2e;
    }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
    }
    #chat-header .left { display: flex; align-items: center; gap: 12px; }
    #chat-header h2 { font-size: 1.1rem; }
    #chat-header span { font-size: 0.75rem; color: #6ee7b7; }

    #user-info { display: flex; align-items: center; gap: 10px; }
    #user-info img {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid #6366f1;
    }
    #user-info span {
      font-size: 0.85rem; color: #ccc;
      max-width: 120px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    #logout-btn {
      background: none;
      border: 1px solid #6366f1;
      color: #6366f1;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }
    #logout-btn:hover { background: #6366f1; color: #fff; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    .msg-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-wrapper.mine { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .msg-bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-wrapper:not(.mine) .msg-bubble {
      background: #2a2a4a;
      border-bottom-left-radius: 4px;
    }
    .msg-wrapper.mine .msg-bubble {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-bottom-right-radius: 4px;
    }

    .msg-meta {
      font-size: 0.7rem;
      color: #888;
      margin-top: 4px;
    }
    .msg-wrapper.mine .msg-meta { text-align: right; }

    .msg-name {
      font-size: 0.75rem;
      color: #a5b4fc;
      margin-bottom: 2px;
      padding-left: 4px;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #2a2a4a;
    }
    #msg-input {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: #6366f1; }
    #msg-input::placeholder { color: #555; }

    #send-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    #loading {
      position: fixed;
      inset: 0;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #aaa;
      z-index: 99;
    }
    .dot-anim::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>

<div id="loading"><span class="dot-anim">Loading</span></div>

<!-- LOGIN -->
<div id="login-screen" style="display:none;">
  <h1>💬 ChatRoom</h1>
  <p>Sign in to join the conversation</p>
  <button id="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
    Continue with Google
  </button>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div id="chat-header">
    <div class="left">
      <div>
        <h2>💬 ChatRoom</h2>
        <span>● Live</span>
      </div>
    </div>
    <div id="user-info">
      <img id="user-avatar" src="" alt=""/>
      <span id="user-name"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Type a message..." maxlength="500" autocomplete="off"/>
    <button id="send-btn">➤</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp,
    limit
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC7ZZPQZMhpF0387z7zttH_k7JLl1K2pG4",
    authDomain: "my-chat-app-d6889.firebaseapp.com",
    projectId: "my-chat-app-d6889",
    storageBucket: "my-chat-app-d6889.firebasestorage.app",
    messagingSenderId: "656889790538",
    appId: "1:656889790538:web:25f264816e46624999e6b3"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const loading     = document.getElementById('loading');
  const loginScreen = document.getElementById('login-screen');
  const chatScreen  = document.getElementById('chat-screen');
  const googleBtn   = document.getElementById('google-btn');
  const logoutBtn   = document.getElementById('logout-btn');
  const msgInput    = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const messagesDiv = document.getElementById('messages');
  const userAvatar  = document.getElementById('user-avatar');
  const userName    = document.getElementById('user-name');

  let currentUser = null;
  let unsubscribe = null;

  onAuthStateChanged(auth, user => {
    loading.style.display = 'none';
    if (user) {
      currentUser = user;
      userAvatar.src = user.photoURL;
      userName.textContent = user.displayName;
      loginScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      listenMessages();
    } else {
      currentUser = null;
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      chatScreen.style.display = 'none';
      loginScreen.style.display = 'block';
      messagesDiv.innerHTML = '';
    }
  });

  googleBtn.addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      alert('Login failed: ' + e.message);
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentUser) return;
    sendBtn.disabled = true;
    msgInput.value = '';
    try {
      await addDoc(collection(db, 'messages'), {
        text,
        uid:      currentUser.uid,
        name:     currentUser.displayName,
        photoURL: currentUser.photoURL,
        createdAt: serverTimestamp()
      });
    } catch (e) {
      console.error(e);
    }
    sendBtn.disabled = false;
    msgInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  function listenMessages() {
    const q = query(collection(db, 'messages'), orderBy('createdAt'), limit(100));
    unsubscribe = onSnapshot(q, snapshot => {
      snapshot.docChanges().forEach(change => {
        if (change.type === 'added') renderMessage(change.doc.data());
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  }

  function renderMessage(data) {
    const isMine = data.uid === currentUser?.uid;

    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper' + (isMine ? ' mine' : '');

    const avatar = document.createElement('img');
    avatar.className = 'msg-avatar';
    avatar.src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}`;

    const col = document.createElement('div');

    if (!isMine) {
      const nameEl = document.createElement('div');
      nameEl.className = 'msg-name';
      nameEl.textContent = data.name;
      col.appendChild(nameEl);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = data.text;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    if (data.createdAt) {
      const d = data.createdAt.toDate();
      meta.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    col.appendChild(bubble);
    col.appendChild(meta);
    wrapper.appendChild(avatar);
    wrapper.appendChild(col);
    messagesDiv.appendChild(wrapper);
  }
</script>
</body>
</html>
